name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go vet ./...
      - run: go test ./...

  race:
    name: race + bench (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go test -race ./...
      - run: go test -run '^$' -bench . -benchmem ./internal/inspect/ ./internal/proxy/

  build:
    name: cross-build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: windows, goarch: amd64, ext: .exe }
          - { goos: darwin,  goarch: amd64, ext: '' }
          - { goos: darwin,  goarch: arm64, ext: '' }
          - { goos: linux,   goarch: amd64, ext: '' }
          - { goos: linux,   goarch: arm64, ext: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags="-s -w" -o dist/holone-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/holone
      - uses: actions/upload-artifact@v4
        with:
          name: holone-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
